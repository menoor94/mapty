<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./output.css" />
    <link rel="stylesheet" href="./input.css" />
    <!-- <link rel="stylesheet" href="./style.css" /> -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <title>Mapty</title>
  </head>
  <body class="h-full p-5">
    <main class="h-full flex flex-row relative">
      <button
        id="del-all-workouts"
        class="absolute text-sm lg:text-[17px] p-1 bg-red-500 text-white opacity-90 hover:opacity-100 cursor-pointer rounded-r rounded-bl"
      >
        Delete all workouts
      </button>
      <div class="scrollbar w-1/3 bg-gray-900 h-full p-5 overflow-auto">
        <h1
          class="flex flex-row justify-center items-center mt-5 lg:mt-1 text-md md:text-2xl text-neutral-200"
        >
          <img
            class="w-8 md:w-14"
            src="./src/assets/icon.png"
            alt="mapty-logo"
          />Mapty
        </h1>
        <div
          id="form-container"
          class="hidden container bg-gray-700 rounded p-5 mt-6 transition-all duration-500 starting:opacity-0"
        >
          <form
            id="workout-form"
            class="flex flex-wrap justify-center items-center gap-4 md:gap-x-10"
          >
            <div
              class="md:w-[calc(50%-1.25rem)] flex flex-col md:flex-row justify-between items-center"
            >
              <label for="" class="text-white">Type</label>
              <select
                id="workout-type"
                class="bg-white w-20 h-6 rounded text-sm"
              >
                <option name="Running" id="">Running</option>
                <option name="Cycling" id="">Cycling</option>
              </select>
            </div>

            <div
              class="form--row md:w-[calc(50%-1.25rem)] flex flex-col md:flex-row justify-between items-center"
            >
              <label for="" class="text-white">Distance</label>
              <input
                id="distance"
                type="number"
                class="bg-white w-20 h-6 p-2 box-border rounded text-sm"
                placeholder="KM"
              />
            </div>

            <div
              class="form--row md:w-[calc(50%-1.25rem)] flex flex-col md:flex-row justify-between items-center"
            >
              <label for="" class="text-white">Duration</label>
              <input
                id="workout-duration"
                type="text"
                class="bg-white w-20 h-6 p-2 box-border rounded text-sm"
                placeholder="min"
              />
            </div>

            <div
              class="form--row md:w-[calc(50%-1.25rem)] flex flex-col md:flex-row justify-between items-center"
            >
              <label for="" class="text-white">Cadence</label>
              <input
                id="workout-cadence"
                type="text"
                class="bg-white w-20 h-6 p-2 box-border rounded text-sm"
                placeholder="step/min"
              />
            </div>

            <div
              class="form--row hidden md:w-[calc(50%-1.25rem)] flex flex-col md:flex-row justify-between items-center"
            >
              <label for="" class="text-white">Elev gain</label>
              <input
                id="workout-elev"
                type="text"
                class="bg-white w-20 h-6 p-2 box-border rounded text-sm"
                placeholder="meter"
              />
            </div>
            <input type="submit" style="display: none" />
          </form>
        </div>

        <ul
          id="workout-list"
          class="scrollbar container text-white mt-10 h-7/12 overflow-auto list-none"
        ></ul>
      </div>
      <div id="map" class="w-2/3 h-full bg-neutral-400"></div>
    </main>
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" defer src="./src/script.js"></script>
  </body>
</html>
